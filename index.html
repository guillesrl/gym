   421|            0%,100% { transform: translate(0,0) rotate(0deg); }
   422|            10%      { transform: translate(-9px,-4px) rotate(-1.5deg); }
   423|            20%      { transform: translate(9px, 5px) rotate(1.5deg); }
   424|            30%      { transform: translate(-9px, 5px) rotate(-1deg); }
   425|            40%      { transform: translate(9px,-5px) rotate(1deg); }
   426|            50%      { transform: translate(-5px, 9px) rotate(-0.5deg); }
   427|            60%      { transform: translate(5px,-9px) rotate(0.5deg); }
   428|            70%      { transform: translate(-9px,-4px) rotate(-1deg); }
   429|            80%      { transform: translate(9px, 4px) rotate(1deg); }
   430|            90%      { transform: translate(-4px, 4px) rotate(-0.5deg); }
   431|        }
   432|        .shake { animation: shake 0.65s cubic-bezier(.36,.07,.19,.97) both; }

   434|        @keyframes flashBurst {
   435|            0%   { opacity: 0.65; transform: scale(0.6); }
   436|            40%  { opacity: 0.9; }
   437|            100% { opacity: 0; transform: scale(2.2); }
   438|        }
   439|        .flash-burst {
   440|            position: fixed; inset: 0; pointer-events: none; z-index: 999;
   441|            background: radial-gradient(circle at 50% 60%, var(--accent) 0%, transparent 65%);
   442|            animation: flashBurst 0.55s ease-out forwards;
   443|        }
